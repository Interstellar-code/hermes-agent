name: matrix_coder
version: "0.6.0"
description: "Matrix Coder — a specialist-coder layer for Hermes. Turns the active Hermes agent into a focused specialist by composing a PERSONA as ephemeral pre_llm_call context. Phase 5 adds a cheap deterministic IntentGate for plain coding requests: it infers one of eight roles, an optional review lens, and an optional domain pack; explicit messages beginning with 'matrix' always override inference. Clear mechanical low-risk requests receive a visible direct-handling recommendation, while sensitive or nontrivial coding work silently receives the inferred specialist persona. Workflow personas (ralph, autopilot, ultrawork, ultraqa), domain packs, and optional Kanban audit cards remain available. Single-writer-per-file is the orchestration-time guardrail; per-role read/write nature is advisory persona guidance. The /matrix command is STATUS/HELP only. Tracks epic #76."
author: Interstellar-code
kind: standalone

# Lifecycle hooks this plugin registers (doc-only list; register() is authoritative).
hooks:
  - pre_llm_call
  - post_llm_call
  - transform_llm_output

# Tools registered with the Hermes agent (none in Phase 0).
provides_tools: []

# Environment variables read at runtime (none in Phase 0).
requires_env: []
