name: archon-comprehensive-pr-review
description: |
  Use when: User wants a comprehensive code review of a pull request with automatic fixes.
  Triggers: "review this PR", "review PR #123", "comprehensive review", "full PR review",
            "review and fix", "check this PR", "code review".
  Does: Syncs PR with main (rebase if needed) -> runs 5 specialized review agents in parallel ->
        synthesizes findings -> auto-fixes CRITICAL/HIGH issues -> reports remaining issues.
  NOT for: Quick questions about a PR, checking CI status, simple "what changed" queries.

  This workflow produces artifacts in $ARTIFACTS_DIR/../reviews/pr-{number}/ and posts
  a comprehensive review comment to the GitHub PR.
nodes:
  - id: scope
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-pr-review-scope
    phase: Scope
  - id: sync
    hermes_task:
      skills:
        - git
        - github
      agent_hint: switch
      model_hint: claude-sonnet-4
    command: archon-sync-pr-with-main
    depends_on:
      - scope
    phase: Scope
  - id: code-review
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-code-review-agent
    depends_on:
      - sync
    phase: Analyze
  - id: error-handling
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-error-handling-agent
    depends_on:
      - sync
    phase: Analyze
  - id: test-coverage
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-test-coverage-agent
    depends_on:
      - sync
    phase: Fix
  - id: comment-quality
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-comment-quality-agent
    depends_on:
      - sync
    phase: Fix
  - id: docs-impact
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-docs-impact-agent
    depends_on:
      - sync
    phase: Verify
  - id: synthesize
    hermes_task:
      skills:
        - planning
        - writing
      agent_hint: morpheus
      model_hint: claude-opus-4
    command: archon-synthesize-review
    depends_on:
      - code-review
      - error-handling
      - test-coverage
      - comment-quality
      - docs-impact
    trigger_rule: one_success
    phase: Verify
  - id: implement-fixes
    hermes_task:
      skills:
        - coding
        - testing
      agent_hint: neo
      model_hint: claude-sonnet-4
    command: archon-implement-review-fixes
    depends_on:
      - synthesize
    phase: Publish
