name: archon-issue-review-full
description: |
  Use when: User wants a FULL, COMPREHENSIVE fix + review pipeline for a GitHub issue.
  Triggers: "full review", "comprehensive fix", "fix with full review", "deep review", "issue review full".
  NOT for: Simple issue fixes (use archon-fix-github-issue instead),
           questions about issues, CI failures, PR reviews, general exploration.

  Full workflow:
  1. Investigate issue -> root cause analysis, implementation plan
  2. Implement fix -> code changes, tests, PR creation
  3. Comprehensive review -> 5 parallel agents with scope awareness
  4. Fix review issues -> address CRITICAL/HIGH findings
  5. Final summary -> decision matrix, follow-up recommendations
nodes:
  - id: investigate
    hermes_task:
      skills:
        - research
      agent_hint: morpheus
      model_hint: claude-opus-4
    command: archon-investigate-issue
    phase: Scope
  - id: implement
    hermes_task:
      skills:
        - coding
        - testing
      agent_hint: neo
      model_hint: claude-sonnet-4
    command: archon-implement-issue
    depends_on:
      - investigate
    context: fresh
    phase: Scope
  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on:
      - implement
    phase: Scope
  - id: review-scope
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-pr-review-scope
    depends_on:
      - verify-pr-base
    context: fresh
    phase: Analyze
  - id: sync
    hermes_task:
      skills:
        - git
        - github
      agent_hint: switch
      model_hint: claude-sonnet-4
    command: archon-sync-pr-with-main
    depends_on:
      - review-scope
    context: fresh
    phase: Analyze
  - id: code-review
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-code-review-agent
    depends_on:
      - sync
    context: fresh
    phase: Analyze
  - id: error-handling
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-error-handling-agent
    depends_on:
      - sync
    context: fresh
    phase: Fix
  - id: test-coverage
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-test-coverage-agent
    depends_on:
      - sync
    context: fresh
    phase: Fix
  - id: comment-quality
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-comment-quality-agent
    depends_on:
      - sync
    context: fresh
    phase: Verify
  - id: docs-impact
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
    command: archon-docs-impact-agent
    depends_on:
      - sync
    context: fresh
    phase: Verify
  - id: synthesize
    hermes_task:
      skills:
        - planning
        - writing
      agent_hint: morpheus
      model_hint: claude-opus-4
    command: archon-synthesize-review
    depends_on:
      - code-review
      - error-handling
      - test-coverage
      - comment-quality
      - docs-impact
    trigger_rule: one_success
    context: fresh
    phase: Verify
  - id: implement-fixes
    hermes_task:
      skills:
        - coding
        - testing
      agent_hint: neo
      model_hint: claude-sonnet-4
    command: archon-implement-review-fixes
    depends_on:
      - synthesize
    context: fresh
    phase: Publish
  - id: summary
    command: archon-workflow-summary
    depends_on:
      - implement-fixes
    context: fresh
    phase: Publish
    hermes_task:
      skills:
        - review
      agent_hint: trinity
      model_hint: claude-sonnet-4
