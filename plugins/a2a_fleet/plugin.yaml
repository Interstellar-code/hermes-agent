name: a2a_fleet
version: "0.8.3"
description: "A2A fleet membership over JSON-RPC: embedded A2A server + fleet_send outbound tool, with echo/llm/agent inbound handlers (agent = real Hermes agent via platform adapter) + managed repo-scoped executor deployment for Claude Code, OpenCode, Codex CLI, and Google Antigravity CLI. v0.4 config bootstrap scaffolds fleet.yaml on first enable and auto-wires managed peers surgically; v0.5 adds a read-only dashboard API (/api/plugins/a2a_fleet/conversations); v0.6 adds OpenCode receiver deploy/status/stop, mode-aware fleet.yaml loading/upsert, and boot-reconcile for all managed executor modes; v0.7 adds Codex CLI receiver (mode: codex, port 9311, sandbox param, thread-based multi-turn via codex exec resume); v0.8 adds Google Antigravity CLI receiver (mode: agy, port 9313, boolean sandbox toggle, NO model selection, plain-text multi-turn via agy --conversation with prefix-strip transcript-tail extraction, requires interactive `agy` sign-in once); v0.8.1 makes the dashboard mode-aware: all four managed modes (claude_code, opencode, codex, agy) appear in the conversations/peers tab with per-mode transcript resolution and a mode field in every response. v0.8.2 backports two hardening fixes to cc and oc receivers: clear stale session_id before remint in oc_receiver (#82) and sanitize forbidden extra_flags in both cc_receiver and oc_receiver (#86). v0.8.3 security: llm.system_prompt_file path-traversal guard (#84) — resolved path must be within get_hermes_home(); regression guard for deploy_*_receiver repo_path in schema required (#72). Anti-loop is enforced orchestrator-side (Hermes); receivers enforce per-context serialization, concurrency, and idle-timeout."
author: Interstellar-code
kind: standalone

# Tool this plugin registers with the Hermes agent.
provides_tools:
  - fleet_send

# Environment variables read at runtime.
# Token env names are dynamic: each peer's token_env key in fleet.yaml names the
# environment variable that holds that peer's pre-shared bearer token.
# Convention: use <PEER_NAME>_A2A_TOKEN (e.g. CONSTRUCT_A2A_TOKEN, SWITCH_A2A_TOKEN).
# The self-server token_env (fleet.server.token_env) follows the same pattern.
# Example required env vars for a two-peer fleet:
#   SWITCH_A2A_TOKEN    — bearer token for this node's inbound requests
#   CONSTRUCT_A2A_TOKEN — bearer token this node uses to call the "construct" peer
# No variables are hard-coded here because each deployment's fleet.yaml determines
# which names are active.
requires_env: []
