name: a2a_fleet
version: "0.4.0"
description: "A2A fleet membership over JSON-RPC: embedded A2A server + fleet_send outbound tool, with echo/llm/agent inbound handlers (agent = real Hermes agent via platform adapter) + Claude Code executor deployment (deploy_cc_receiver: repo-pinned managed receiver, persisted token, boot-reconcile leaves healthy receivers running). v0.4 config bootstrap: a commented fleet.yaml is scaffolded on first enable (no more silent-idle), and deploy_cc_receiver auto-wires its managed peer (url + token_env) into fleet.yaml surgically, comment-preserving (no hand-editing, no 401). Anti-loop is enforced orchestrator-side (Hermes); the receiver enforces per-context serialization, concurrency, and idle-timeout."
author: Interstellar-code
kind: standalone

# Tool this plugin registers with the Hermes agent.
provides_tools:
  - fleet_send

# Environment variables read at runtime.
# Token env names are dynamic: each peer's token_env key in fleet.yaml names the
# environment variable that holds that peer's pre-shared bearer token.
# Convention: use <PEER_NAME>_A2A_TOKEN (e.g. CONSTRUCT_A2A_TOKEN, SWITCH_A2A_TOKEN).
# The self-server token_env (fleet.server.token_env) follows the same pattern.
# Example required env vars for a two-peer fleet:
#   SWITCH_A2A_TOKEN    — bearer token for this node's inbound requests
#   CONSTRUCT_A2A_TOKEN — bearer token this node uses to call the "construct" peer
# No variables are hard-coded here because each deployment's fleet.yaml determines
# which names are active.
requires_env: []
